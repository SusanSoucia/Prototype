# Prototype 后端开发环境基础设施
# 启动: docker compose -f docs/docker-compose.yaml up -d
# 停止: docker compose -f docs/docker-compose.yaml stop
# 销毁: docker compose -f docs/docker-compose.yaml down -v
#
# 也可以直接用 cold-start.sh 一键操作。

services:
  mysql:
    image: mysql:8.0
    container_name: prototype-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: prototype2025
      MYSQL_DATABASE: prototype_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pprototype2025"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prototype-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass prototype2025
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "prototype2025", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: prototype-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft 模式（无需 ZooKeeper）
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 允许自动创建 topic
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 1
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: prototype-es
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=prototype2025
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "INGEST_GEOIP_DOWNLOADER_ENABLED=false"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-u", "elastic:prototype2025", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: prototype-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 初始化：创建 uploads bucket
  minio-init:
    image: minio/mc:latest
    container_name: prototype-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/uploads;
      echo 'MinIO bucket uploads ready';
      exit 0;
      "

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  es-data:
  minio-data:
